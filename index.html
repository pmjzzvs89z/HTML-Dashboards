<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Dashboards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    p.subtitle { color: #94a3b8; margin-bottom: 2.5rem; font-size: 0.95rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 900px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
      text-decoration: none;
      color: #e2e8f0;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px #3b82f6;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 0.4rem; }
    .card p { font-size: 0.85rem; color: #94a3b8; }
    .empty {
      text-align: center;
      color: #64748b;
      padding: 3rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <h1>Science Dashboards</h1>
  <p class="subtitle">Drop your HTML dashboards into the <code>/dashboards</code> folder.</p>

  <div class="grid">
    <a href="dashboards/bond-half-life-dashboard_6-7-2026_Jerzy.html" class="card">
      <h2>Bond Half-Life</h2>
    </a>
    <a href="dashboards/claude-code-slash-commands.html" class="card">
      <h2>Claude Code Slash Commands</h2>
    </a>
    <a href="dashboards/coding-academy.html" class="card">
      <h2>Coding Academy</h2>
    </a>
    <a href="dashboards/multinuclear-nmr.html" class="card">
      <h2>Multinuclear NMR</h2>
    </a>
    <a href="dashboards/periodic-table.html" class="card">
      <h2>Periodic Table</h2>
    </a>
  </div>
</body>
</html>
