<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a1a;
    color: #e0e0f0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    letter-spacing: 4px;
    margin-bottom: 16px;
    color: #c0c8ff;
    text-transform: uppercase;
  }

  #controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  #search {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #444;
    background: #1a1a2e;
    color: #e0e0f0;
    font-size: 0.9rem;
    width: 220px;
    outline: none;
  }
  #search:focus { border-color: #7080ff; }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 16px;
    border: 1px solid #444;
    background: #1a1a2e;
    color: #ccc;
    cursor: pointer;
    font-size: 0.78rem;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: #7080ff; color: #fff; background: #2a2a4e; }

  #table-wrapper {
    overflow-x: auto;
    padding-bottom: 8px;
  }

  #periodic-table {
    display: grid;
    grid-template-columns: repeat(18, 54px);
    grid-template-rows: repeat(10, 54px);
    gap: 3px;
    width: fit-content;
    margin-left: max(0px, calc(50% - 670.5px)); /* centers table+gap+panel as one block */
    margin-right: auto;
    padding-top: 10px;
  }

  .element {
    width: 54px;
    height: 54px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.1);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    position: relative;
    user-select: none;
  }

  .element:hover {
    transform: scale(1.18);
    z-index: 10;
    box-shadow: 0 0 18px rgba(120,140,255,0.6);
    border-color: rgba(255,255,255,0.5);
  }

  .element.dimmed { opacity: 0.15; }
  .element.highlighted { opacity: 1; transform: scale(1.05); }

  .el-number { font-size: 0.55rem; color: rgba(255,255,255,0.6); align-self: flex-start; padding-left: 4px; line-height: 1; }
  .el-symbol { font-size: 1.1rem; font-weight: 700; line-height: 1; }
  .el-name   { font-size: 0.53rem; color: rgba(255,255,255,0.75); margin-top: 1px; }
  .el-mass   { font-size: 0.50rem; color: rgba(255,255,255,0.5); }

  /* Category colors */
  .alkali-metal       { background: linear-gradient(135deg,#7b1f1f,#a33030); }
  .alkaline-earth     { background: linear-gradient(135deg,#7b4a1f,#a36530); }
  .transition-metal   { background: linear-gradient(135deg,#1f4a7b,#2d6ea3); }
  .post-transition    { background: linear-gradient(135deg,#1f7b5a,#2da37d); }
  .metalloid          { background: linear-gradient(135deg,#5a1f7b,#7d2da3); }
  .nonmetal           { background: linear-gradient(135deg,#1f7b2a,#2da33a); }
  .halogen            { background: linear-gradient(135deg,#7b7b1f,#a3a32d); }
  .noble-gas          { background: linear-gradient(135deg,#1f6b7b,#2d8fa3); }
  .lanthanide         { background: linear-gradient(135deg,#6b1f5a,#8f2d7d); }
  .actinide           { background: linear-gradient(135deg,#4a1f6b,#6b2d8f); }
  .unknown            { background: linear-gradient(135deg,#3a3a3a,#555); }

  /* Legend */
  #legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 14px auto;
    max-width: 900px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: #bbb;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 12px;
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .legend-item:hover { border-color: #666; }
  .legend-item.active-legend { border-color: #aaa; background: rgba(255,255,255,0.08); }
  .legend-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* Modal overlay — hidden, kept for click-outside close on small screens */
  #modal-overlay { display: none; }

  /* Info panel */
  #info-panel {
    position: fixed;
    right: 20px;
    width: 300px;
    overflow-y: auto;
    border-radius: 16px;
    padding: 25px 24px 5px; /* top: 14px base + 11px (54/5 = 1/5 element box) */
    display: none;
    z-index: 100;
    box-shadow: 0 16px 60px rgba(0,0,0,0.5);
    font-family: 'Segoe UI', monospace;
  }
  #info-panel.visible { display: block; }

  @media (max-width: 1200px) {
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 99;
      backdrop-filter: blur(2px);
    }
    #modal-overlay.visible { display: block; }
    #info-panel {
      right: 50%;
      top: auto;
      bottom: 16px;
      transform: translateX(50%);
      width: 92vw;
      max-width: 360px;
    }
  }

  #info-symbol {
    font-size: 3.6rem;
    font-weight: 900;
    text-align: center;
    line-height: 1;
    margin-bottom: 4px;
  }
  #info-name {
    text-align: center;
    font-size: 1.05rem;
    font-weight: 700;
    color: #111;
    margin-bottom: 2px;
  }
  #info-category {
    text-align: center;
    font-size: 0.63rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Two stat boxes */
  #info-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .stat-box {
    border-radius: 8px;
    padding: 7px 10px;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(0,0,0,0.07);
  }
  .stat-label {
    font-size: 0.58rem;
    color: #666;
    margin-bottom: 2px;
    font-family: 'Segoe UI', monospace;
  }
  .stat-value {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1;
  }

  /* Detail rows */
  #info-details { margin-bottom: 12px; }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.67rem;
    padding: 4px 0;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    color: #666;
    font-family: 'Segoe UI', monospace;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row span:last-child {
    font-weight: 700;
    color: #111;
    text-align: right;
    max-width: 180px;
  }


  /* Series labels */
  .series-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    color: #666;
    font-style: italic;
  }

  /* Light/dark toggle */
  #theme-toggle {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 200;
    background: #1a1a2e;
    border: 1px solid #444;
    border-radius: 20px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.8rem;
    color: #ccc;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    user-select: none;
  }
  #theme-toggle:hover { border-color: #7080ff; color: #fff; }

  /* ── Light mode element color overrides ── */
  body.light .alkali-metal     { background: linear-gradient(135deg,#c47070,#d48888); }
  body.light .alkaline-earth   { background: linear-gradient(135deg,#c49060,#d4a878); }
  body.light .transition-metal { background: linear-gradient(135deg,#6080b8,#7898cc); }
  body.light .post-transition  { background: linear-gradient(135deg,#4aa888,#60bca0); }
  body.light .metalloid        { background: linear-gradient(135deg,#9060b8,#a878cc); }
  body.light .nonmetal         { background: linear-gradient(135deg,#52a85e,#68bc74); }
  body.light .halogen          { background: linear-gradient(135deg,#b0a830,#c4bc48); }
  body.light .noble-gas        { background: linear-gradient(135deg,#3898b0,#50b0c8); }
  body.light .lanthanide       { background: linear-gradient(135deg,#b05898,#c470b0); }
  body.light .actinide         { background: linear-gradient(135deg,#7858b8,#9070cc); }
  body.light .unknown          { background: linear-gradient(135deg,#888898,#9898a8); }

  /* ── Light mode overrides ── */
  body.light {
    background: #eceef5;
    color: #1a1a2e;
  }
  body.light h1 { color: #3040a0; }
  body.light #search {
    background: #fff;
    color: #1a1a2e;
    border-color: #bbc;
  }
  body.light #search:focus { border-color: #5060d0; }
  body.light .filter-btn {
    background: #fff;
    color: #444;
    border-color: #bbc;
  }
  body.light .filter-btn:hover,
  body.light .filter-btn.active {
    background: #dde0f8;
    color: #1a1a2e;
    border-color: #5060d0;
  }
  body.light .legend-item { color: #444; }
  body.light .legend-item:hover { border-color: #999; }
  body.light .series-label { color: #888; }
  body.light #theme-toggle {
    background: #fff;
    border-color: #bbc;
    color: #444;
  }
  body.light #theme-toggle:hover { border-color: #5060d0; color: #1a1a2e; }

</style>
</head>

function mixWithWhite([r, g, b], f = 0.82) {
  return `rgb(${Math.round(r+(255-r)*f)},${Math.round(g+(255-g)*f)},${Math.round(b+(255-b)*f)})`;
}

function getGridPos(el) {
  const [num, sym, name, mass, cat, grp, per] = el;
  if (num >= 57 && num <= 71) return [num - 57 + 4, 9];
  if (num >= 89 && num <= 103) return [num - 89 + 4, 10];
  return [grp, per];
}

const table = document.getElementById('periodic-table');

// Build legend
const legendEl = document.getElementById('legend');
Object.entries(CATEGORIES).forEach(([key, {label, color}]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.category = key;
  item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div>${label}`;
  item.addEventListener('click', () => filterByCategory(key));
  legendEl.appendChild(item);
});

// Place elements on grid
ELEMENTS.forEach(el => {
  const [num, sym, name, mass, cat, grp, per, phase, econf, eneg, disc] = el;
  const [col, row] = getGridPos(el);
  const div = document.createElement('div');
  div.className = `element ${cat}`;
  div.style.gridColumn = col;
  div.style.gridRow = row;
  div.dataset.num = num;
  div.dataset.sym = sym.toLowerCase();
  div.dataset.name = name.toLowerCase();
  div.dataset.cat = cat;
  div.dataset.phase = phase.toLowerCase();
  div.innerHTML = `
    <span class="el-number">${num}</span>
    <span class="el-symbol">${sym}</span>
    <span class="el-name">${name}</span>
    <span class="el-mass">${mass}</span>
  `;
  div.addEventListener('click', () => {
    if (currentElement === num && panel.classList.contains('visible')) {
      closePanel();
      currentElement = null;
    } else {
      currentElement = num;
      showInfo(el);
    }
  });
  table.appendChild(div);
});

laP.className = 'element lanthanide';
laP.style.cssText = 'grid-column:3;grid-row:6;cursor:default';
laP.innerHTML = `<span class="el-symbol" style="font-size:1.4rem">*</span><span class="el-name">57–71</span>`;
table.appendChild(laP);

const acP = document.createElement('div');
acP.className = 'element actinide';
acP.style.cssText = 'grid-column:3;grid-row:7;cursor:default';
acP.innerHTML = `<span class="el-symbol" style="font-size:1.4rem">**</span><span class="el-name">89–103</span>`;
table.appendChild(acP);

const laLabel = document.createElement('div');
laLabel.className = 'series-label';
laLabel.style.cssText = 'grid-column:1/4;grid-row:9';
laLabel.textContent = '* Lanthanides';
table.appendChild(laLabel);

const acLabel = document.createElement('div');
acLabel.className = 'series-label';
acLabel.style.cssText = 'grid-column:1/4;grid-row:10';
acLabel.textContent = '** Actinides';
table.appendChild(acLabel);

// Info panel
const panel   = document.getElementById('info-panel');
const overlay = document.getElementById('modal-overlay');

function fmt(v, unit='') {
  if (v === null || v === undefined) return '—';
  return v + (unit ? ' ' + unit : '');
}

function magFull(m) {
  return { DM:'Diamagnetic', PM:'Paramagnetic', FM:'Ferromagnetic',
           AFM:'Antiferromagnetic', FiM:'Ferrimagnetic', '?':'—' }[m] || m || '—';
}

function showInfo(el) {
  const [num, sym, name, mass, cat, grp, per, phase, econf, eneg, disc] = el;
  const ex    = EXTRA[num] || {};
  const cat_  = CATEGORIES[cat] || { label: cat, color: '#888', rgb: [136,136,136] };
  const color = cat_.color;
  const rgb   = cat_.rgb;
  const bg    = mixWithWhite(rgb, 0.85);

  panel.style.background = bg;
  panel.style.border = `2px solid ${color}`;

  document.getElementById('info-symbol').textContent = sym;
  document.getElementById('info-symbol').style.color = color;
  document.getElementById('info-name').textContent = name;
  document.getElementById('info-category').textContent = cat_.label;
  document.getElementById('info-category').style.color = color;
  document.getElementById('stat-number').textContent = num;
  document.getElementById('stat-number').style.color = color;
  document.getElementById('stat-mass').textContent = mass;
  document.getElementById('stat-mass').style.color = color;

  const meltStr = ex.melt !== null && ex.melt !== undefined ? ex.melt + ' °C' : '—';
  const boilStr = ex.boil !== null && ex.boil !== undefined ? ex.boil + ' °C' : '—';
  const densStr = ex.density !== null && ex.density !== undefined ? ex.density + ' g/cm³' : '—';

  document.getElementById('info-details').innerHTML = `
    <div class="info-row"><span>Electron Config</span><span>${econf}</span></div>
    <div class="info-row"><span>Oxidation States</span><span>${ex.ox || '—'}</span></div>
    <div class="info-row"><span>Electronegativity (χ)</span><span>${eneg ?? '—'}</span></div>
    <div class="info-row"><span>Density</span><span>${densStr}</span></div>
    <div class="info-row"><span>Covalent Radius</span><span>${fmt(ex.rad, 'pm')}</span></div>
    <div class="info-row"><span>Ioniz. Energy (IE₁)</span><span>${fmt(ex.ie1, 'kJ/mol')}</span></div>
    <div class="info-row"><span>Electron Affinity</span><span>${ex.ea !== null && ex.ea !== undefined ? ex.ea + ' kJ/mol' : '—'}</span></div>
    <div class="info-row"><span>Crystal Structure</span><span>${ex.crystal || '—'}</span></div>
    <div class="info-row"><span>Magnetic Order</span><span>${magFull(ex.mag)}</span></div>
    <div class="info-row"><span>Melting Point</span><span>${meltStr}</span></div>
    <div class="info-row"><span>Boiling Point</span><span>${boilStr}</span></div>
    <div class="info-row"><span>ΔH fusion</span><span>${fmt(ex.hfus, 'kJ/mol')}</span></div>
    <div class="info-row"><span>ΔH vaporization</span><span>${fmt(ex.hvap, 'kJ/mol')}</span></div>
    <div class="info-row"><span>Thermal Conduct.</span><span>${fmt(ex.tc, 'W/m·K')}</span></div>
    <div class="info-row"><span>Phase at STP</span><span>${phase}</span></div>
    <div class="info-row"><span>Discovered</span><span>${disc}</span></div>
    <div class="info-row"><span>Discovered By</span><span>${ex.by || '—'}</span></div>
  `;

  panel.classList.add('visible');
  overlay.classList.add('visible');
  alignPanel();
}

function closePanel() {
  panel.classList.remove('visible');
  overlay.classList.remove('visible');
}

let currentElement = null;

function alignLayout() {
  const wrapperRect = document.getElementById('table-wrapper').getBoundingClientRect();
  const tableRect   = document.getElementById('periodic-table').getBoundingClientRect();

  // Align page-header to sit exactly above the periodic table
  const header = document.getElementById('page-header');
  header.style.marginLeft = (tableRect.left - wrapperRect.left) + 'px';
  header.style.width      = tableRect.width + 'px';

  if (!panel.classList.contains('visible')) return;

  const bottomGap = window.innerHeight - wrapperRect.bottom;
  if (window.innerWidth > 1200) {
    const GAP        = 54 / 3; // 18px = 1/3 of element box width
    const panelLeft  = tableRect.right + GAP;
    const rightValue = window.innerWidth - panelLeft - panel.offsetWidth;
    panel.style.right     = rightValue + 'px';
    const EXTRA_H = 54 / 3 / 2 + 54 / 3; // 9px (prev) + 18px (1/3 element box) = 27px above table top
    panel.style.top       = (tableRect.top    - EXTRA_H) + 'px';
    panel.style.bottom    = (window.innerHeight - tableRect.bottom) + 'px';
    panel.style.transform = 'none';
  } else {
    panel.style.right     = '';
    panel.style.bottom    = '';
    panel.style.top       = '';
    panel.style.transform = '';
  }
}

function alignPanel() { alignLayout(); }

window.addEventListener('resize', alignLayout);
requestAnimationFrame(() => {
  alignLayout();
  currentElement = 1;
  showInfo(ELEMENTS[0]);
});

overlay.addEventListener('click', closePanel);

document.addEventListener('click', e => {
  if (e.target.closest('#theme-toggle')) return;

  const clickedElement = e.target.closest('.element');
  const clickedLegend  = e.target.closest('.legend-item');

  // Close popup if click is outside element boxes and popup
  if (panel.classList.contains('visible')) {
    if (!panel.contains(e.target) && !clickedElement) {
      closePanel();
      currentElement = null;
    }
  }

  // Clear category filter if click is outside element boxes and legend items
  if (activeCategory && !clickedElement && !clickedLegend) {
    clearCategoryFilter();
  }
});

// Light / dark toggle
const themeBtn = document.getElementById('theme-toggle');
themeBtn.addEventListener('click', () => {
  const isLight = document.body.classList.toggle('light');
  themeBtn.textContent = isLight ? '🌙' : '☀️';
  if (isLight) {
    currentElement = 1;
    showInfo(ELEMENTS[0]);
  }
});

// Search
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  const els = document.querySelectorAll('.element[data-num]');
  if (!q) { els.forEach(el => el.classList.remove('dimmed','highlighted')); return; }
  els.forEach(el => {
    const match = el.dataset.sym.includes(q) || el.dataset.name.includes(q) || el.dataset.num === q;
    el.classList.toggle('dimmed', !match);
    el.classList.toggle('highlighted', match);
  });
});

// Phase filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const phase = btn.dataset.filter;
    document.querySelectorAll('.element[data-num]').forEach(el => {
      el.classList.toggle('dimmed', phase !== 'all' && el.dataset.phase !== phase);
    });
  });
});

let activeCategory = null;

function clearCategoryFilter() {
  document.querySelectorAll('.element[data-num]').forEach(el => el.classList.remove('dimmed','highlighted'));
  document.querySelectorAll('.legend-item').forEach(li => li.classList.remove('active-legend'));
  activeCategory = null;
}

function filterByCategory(cat) {
  if (activeCategory === cat) { clearCategoryFilter(); return; }
  activeCategory = cat;
  document.querySelectorAll('.element[data-num]').forEach(el => {
    el.classList.toggle('dimmed', el.dataset.cat !== cat);
    el.classList.toggle('highlighted', el.dataset.cat === cat);
  });
  document.querySelectorAll('.legend-item').forEach(li => {
    li.classList.toggle('active-legend', li.dataset.category === cat);
  });
}
</script>
</body>
</html>
