<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APO Conference Speaker Database 1997-2024</title>
<style>
  :root {
    --bg: #0f0f1a; --bg-card: #1a1a2e; --bg-hover: #252545;
    --accent: #6c63ff; --accent2: #ff6b6b; --accent3: #4ecdc4; --accent4: #ffd93d;
    --text: #e0e0f0; --text-dim: #8888aa; --border: #2a2a4a;
  }
  :root[data-theme="light"] {
    --bg: #f5f5fa; --bg-card: #fff; --bg-hover: #eeeef5;
    --text: #1a1a2e; --text-dim: #666688; --border: #d0d0e0;
  }
  :root[data-theme="dark"] {
    --bg: #0f0f1a; --bg-card: #1a1a2e; --bg-hover: #252545;
    --text: #e0e0f0; --text-dim: #8888aa; --border: #2a2a4a;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      --bg: #f5f5fa; --bg-card: #fff; --bg-hover: #eeeef5;
      --text: #1a1a2e; --text-dim: #666688; --border: #d0d0e0;
    }
  }
  body, .section, .stat-box, .tab-btn, .search-input, select, th, .filter-banner, .pill, .badge, .trend-note {
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .theme-toggle {
    position: fixed; top: 18px; right: 18px; z-index: 100;
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text); cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .theme-toggle:hover { transform: scale(1.1); background: var(--bg-hover); box-shadow: 0 4px 12px rgba(108,99,255,0.3); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg); color: var(--text);
    padding: 24px 20px; max-width: 1200px; margin: 0 auto;
  }
  h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--text-dim); font-size: 13px; margin: 6px 0 20px; }
  .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-box {
    display: flex; flex-direction: column; align-items: center; padding: 16px;
    background: var(--bg-hover); border-radius: 10px; min-width: 90px;
  }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
  .stat-num.red { color: var(--accent2); }
  .stat-num.teal { color: var(--accent3); }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-align: center; }
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn {
    padding: 8px 16px; border: 1px solid var(--border); background: transparent;
    color: var(--text); cursor: pointer; font-size: 12px; font-family: inherit;
    transition: all 0.2s; border-radius: 6px; white-space: nowrap; font-weight: 600;
  }
  .tab-btn:hover { background: var(--bg-hover); color: var(--accent); }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .search-input {
    flex: 1; min-width: 200px; padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text); font-size: 13px; font-family: inherit; outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  select {
    padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text); font-size: 13px; font-family: inherit;
  }
  .section {
    background: var(--bg-card); border-radius: 12px;
    padding: 20px 24px; margin-bottom: 16px; overflow: auto; max-height: 72vh;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-dim); border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap; position: sticky; top: 0;
    background: var(--bg-card); z-index: 1;
  }
  th:hover { color: var(--accent); }
  td {
    padding: 10px 12px; font-size: 13px;
    border-bottom: 1px solid rgba(42,42,74,0.3); vertical-align: top;
  }
  tr:hover td { background: var(--bg-hover); }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 28px; height: 28px; border-radius: 14px; font-weight: 700; font-size: 13px;
  }
  .badge.high { background: rgba(255,107,107,0.2); color: var(--accent2); }
  .badge.mid { background: rgba(108,99,255,0.2); color: var(--accent); }
  .badge.low { background: rgba(78,205,196,0.2); color: var(--accent3); }
  .badge.none { background: var(--bg-hover); color: var(--text-dim); }
  .badge-link { cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .badge-link:hover { transform: scale(1.15); box-shadow: 0 0 0 3px rgba(108,99,255,0.3); }
  .pill {
    display: inline-block; padding: 2px 8px; margin: 1px 2px; border-radius: 10px;
    font-size: 11px; background: var(--bg-hover); color: var(--text-dim);
  }
  .pill.recent { background: rgba(108,99,255,0.25); color: var(--accent); }
  .bar {
    height: 20px; border-radius: 3px; min-width: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
  }
  .dim { color: var(--text-dim); }
  .bold { font-weight: 600; }
  .small { font-size: 12px; }
  .teal { color: var(--accent3); }
  .right { text-align: right; }
  .center { text-align: center; }
  .trend-cell {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 6px; font-size: 11px; font-weight: 600;
  }
  .trend-note {
    margin-top: 20px; padding: 16px; background: var(--bg-hover); border-radius: 8px;
  }
  .trend-note-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--accent3); }
  .trend-note-body { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 4px; margin-right: 6px; }
  .footer { color: var(--text-dim); font-size: 11px; margin-top: 12px; text-align: right; }
  #content { min-height: 200px; }
  .link {
    color: var(--accent); cursor: pointer; text-decoration: none; border-bottom: 1px dashed rgba(108,99,255,0.4);
  }
  .link:hover { color: var(--accent3); border-bottom-color: var(--accent3); }
  .filter-banner {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px; margin-bottom: 12px;
    background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.25);
    border-radius: 8px; font-size: 12px;
  }
  .filter-banner .label { color: var(--text-dim); }
  .filter-banner .value { color: var(--accent); font-weight: 700; }
  .clear-btn {
    margin-left: auto; padding: 6px 16px; border-radius: 6px; border: none;
    background: #e0a030; color: #1a1a2e; cursor: pointer; font-family: inherit;
    font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.15s;
  }
  .clear-btn:hover { background: #f0b840; transform: scale(1.05); }
  .trend-cell.clickable { cursor: pointer; }
  .trend-cell.clickable:hover { outline: 2px solid var(--accent); }
  .cat-link { cursor: pointer; }
  .cat-link:hover { color: var(--accent); }
  .pill.clickable { cursor: pointer; transition: background 0.15s, color 0.15s, transform 0.15s; }
  .pill.clickable:hover { background: var(--accent); color: white; transform: scale(1.08); }
  .name-link { cursor: pointer; transition: color 0.15s; }
  .name-link:hover { color: var(--accent); }
  .aff-link { cursor: pointer; transition: color 0.15s; }
  .aff-link:hover { color: var(--accent); }
</style>
<script>
  (function() {
    const saved = localStorage.getItem("apo-theme");
    const theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>

function updateThemeIcon() {
  const t = document.documentElement.getAttribute("data-theme");
  const btn = document.getElementById("themeToggle");
  if (btn) btn.textContent = t === "light" ? "🌙" : "☀️";
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme") || "dark";
  const next = cur === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("apo-theme", next);
  updateThemeIcon();
}
updateThemeIcon();

function normalizeName(n) {
  return n.replace(/^(Dr\.?\s+|Prof\.?\s+)/i,"").replace(/\s+/g," ").trim();
}

function buildStats() {
  const map = new Map();
  speakers.forEach(s => {
    const key = normalizeName(s.name);
    if (!map.has(key)) map.set(key, {name:s.name, affiliations:new Set(), years:[], topics:[], appearances:0});
    const e = map.get(key);
    e.affiliations.add(s.affiliation);
    e.years.push(s.year);
    e.topics.push({year:s.year, topic:s.topic});
    e.appearances++;
    if (s.year >= Math.max(...e.years.slice(0,-1),0)) e.name = s.name;
  });
  return [...map.values()].map(e => ({
    ...e, affiliations:[...e.affiliations],
    years:[...new Set(e.years)].sort(),
    lastYear: Math.max(...e.years), firstYear: Math.min(...e.years),
  }));
}

const stats = buildStats();

  "Characterization & Analytics":["characteriz","chromatograph","NMR","spectro","GPC","TREF","SEC","rheolog","imaging","thermal analysis","calorimetr","mass spectrom"],
  "New Materials & Architecture":["block copolymer","architecture","precision","nanostructur","functional","elastomer","blend","composite","nanocomposit","multiblock","star type","graft","cyclic poly","cycloolefin"],
  "Process Engineering":["reactor","process","scale-up","gas phase","slurry","condensed mode","industrial","plant","extrusion","3D print","additive manufactur"],
  "Structure-Property":["structure-property","crystalliz","morpholog","mechanical","melt","processing","film","pipe","adhesion","nucleation","melting"],
  "Market & Business":["market","trend","business","industry","innovation strategy","energy","overview","prospect"],
  "Stabilization & Additives":["stabiliz","additive","antioxidant","fouling"],
};

function categorizeTopic(t) {
  const lo = t.toLowerCase();
  const cats = [];
  for (const [cat,kws] of Object.entries(topicCats)) if (kws.some(k=>lo.includes(k))) cats.push(cat);
  return cats.length ? cats : ["Other"];
}

const catColors = {
  "Catalysis & Mechanisms":"#6c63ff","Sustainability & Recycling":"#4ecdc4",
  "Characterization & Analytics":"#ffd93d","New Materials & Architecture":"#ff6b6b",
  "Process Engineering":"#a78bfa","Structure-Property":"#f97316",
  "Market & Business":"#06b6d4","Stabilization & Additives":"#84cc16",
};

const affLookup = new Map();
speakers.forEach(s => {
  const norm = normalizeAff(s.affiliation);
  if (!affLookup.has(norm)) affLookup.set(norm, new Set());
  affLookup.get(norm).add(s.affiliation);
});

// State
let currentTab = 0, search = "", sortBy = "appearances", sortDir = "desc",
    selectedYear = 2024, minAppearances = 2;
let filterAff = null, filterAffYear = null, filterCat = null, filterCatYear = null, filterSpeaker = null;

document.getElementById("subtitle").textContent =
  `Advances in Polyolefins · 1997–2024 · ${speakers.length} presentations · ${stats.length} unique speakers · Planning tool for 2027`;

const sr = document.getElementById("stats-row");
sr.innerHTML = [
  ["", allYears.length, "Conferences"],
  ["", stats.length, "Unique Speakers"],
  ["", speakers.length, "Total Talks"],
  ["red", stats.filter(s=>s.appearances>=3).length, "3+ Times"],
  ["teal", stats.filter(s=>s.appearances>=5).length, "5+ Times"],
].map(([cls,n,l]) => `<div class="stat-box"><div class="stat-num ${cls}">${n}</div><div class="stat-label">${l}</div></div>`).join("");

function renderTabs() {
  document.getElementById("main-tabs").innerHTML = TABS.map((t,i) =>
    `<button class="tab-btn ${currentTab===i?'active':''}" onclick="setTab(${i})">${t}</button>`
  ).join("");
}

function setTab(i) {
  currentTab = i;
  if (i !== 0) { filterAff = null; filterAffYear = null; filterCat = null; filterCatYear = null; filterSpeaker = null; }
  render();
}
function setSearch(v) { search = v; filterAff = null; filterAffYear = null; filterCat = null; filterCatYear = null; filterSpeaker = null; render(); refocusSearch(); }
function setMinApp(v) { minAppearances = +v; render(); }
function refocusSearch() {
  const box = document.getElementById("searchBox");
  if (box) { box.focus(); box.selectionStart = box.selectionEnd = box.value.length; }
}
function setSelYear(y) { selectedYear = y; render(); }
function doSort(col) {
  if (sortBy === col) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortBy = col; sortDir = "desc"; }
  render();
}

function drillAff(normName, year) {
  filterAff = normName; filterAffYear = year || null;
  filterCat = null; filterCatYear = null; filterSpeaker = null; search = "";
  currentTab = 0; render();
  window.scrollTo({top: document.getElementById("content").offsetTop - 80, behavior: "smooth"});
}
function drillYear(year) {
  selectedYear = year; currentTab = 1;
  filterAff = null; filterAffYear = null; filterCat = null; filterCatYear = null; filterSpeaker = null; search = "";
  render();
  window.scrollTo({top: document.getElementById("content").offsetTop - 80, behavior: "smooth"});
}
function drillCat(catName, year) {
  filterCat = catName; filterCatYear = year || null; filterAff = null; filterAffYear = null; filterSpeaker = null; search = "";
  currentTab = 0; render();
  window.scrollTo({top: document.getElementById("content").offsetTop - 80, behavior: "smooth"});
}
function drillSpeaker(name) {
  filterSpeaker = name; filterAff = null; filterAffYear = null; filterCat = null; filterCatYear = null; search = "";
  currentTab = 0; render();
  window.scrollTo({top: document.getElementById("content").offsetTop - 80, behavior: "smooth"});
}
function clearFilter() {
  filterAff = null; filterAffYear = null; filterCat = null; filterCatYear = null; filterSpeaker = null; search = "";
  render();
}

function badgeClass(n) { return n>=7?"high":n>=5?"mid":n>=3?"low":"none"; }
function pillClass(y) { return y>=2019?"pill recent":"pill"; }
function arrow(col) { return sortBy===col?(sortDir==="desc"?" ▼":" ▲"):""; }

function speakerMatchesAff(entry, normAff, year) {
  const rawAffs = affLookup.get(normAff);
  if (!rawAffs) return false;
  if (!year) return entry.affiliations.some(a => rawAffs.has(a));
  return speakers.some(s =>
    normalizeName(s.name) === normalizeName(entry.name) &&
    s.year === year && rawAffs.has(s.affiliation));
}
function speakerMatchesCat(entry, catName, year) {
  return entry.topics.some(t => {
    if (year && t.year !== year) return false;
    return categorizeTopic(t.topic).includes(catName);
  });
}

function getFiltered() {
  let list = stats;
  if (filterSpeaker) {
    const nk = normalizeName(filterSpeaker);
    list = list.filter(x => normalizeName(x.name) === nk);
  } else if (filterAff) {
    list = list.filter(x => speakerMatchesAff(x, filterAff, filterAffYear));
  } else if (filterCat) {
    list = list.filter(x => speakerMatchesCat(x, filterCat, filterCatYear));
  } else if (search) {
    const s = search.toLowerCase();
    list = list.filter(x => x.name.toLowerCase().includes(s) ||
      x.affiliations.some(a=>a.toLowerCase().includes(s)) ||
      x.topics.some(t=>t.topic.toLowerCase().includes(s)));
  }
  list = [...list].sort((a,b) => {
    let va = a[sortBy], vb = b[sortBy];
    if (typeof va==="string") return sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va);
    return sortDir==="asc"?va-vb:vb-va;
  });
  return list;
}

function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, "&quot;"); }

function renderSpeakerTable(list, showTopicCol, showAllTopics, showAffTopics) {
  let extraHeader = '';
  if (showTopicCol) extraHeader = '<th>Matching Topic</th>';
  else if (showAllTopics) extraHeader = '<th>All APO Talks</th>';
  else if (showAffTopics) extraHeader = `<th>${filterAffYear ? filterAffYear + ' Talk' : 'Talks at ' + filterAff}</th>`;
  let rows = list.map(s => {
    let extraCell = '';
    if (showTopicCol && filterCat) {
      const matching = s.topics.filter(t => {
        if (filterCatYear && t.year !== filterCatYear) return false;
        return categorizeTopic(t.topic).includes(filterCat);
      });
      extraCell = `<td class="small dim">${matching.map(t => `<div style="margin-bottom:4px"><span class="pill clickable" onclick="drillYear(${t.year})" title="See ${t.year} program">${t.year}</span> ${t.topic}</div>`).join("")}</td>`;
    } else if (showAllTopics) {
      extraCell = `<td class="small dim">${s.topics.map(t => `<div style="margin-bottom:4px"><span class="pill clickable" onclick="drillYear(${t.year})" title="See ${t.year} program">${t.year}</span> ${t.topic}</div>`).join("")}</td>`;
    } else if (showAffTopics) {
      const rawAffs = affLookup.get(filterAff) || new Set();
      const matching = speakers.filter(sp =>
        normalizeName(sp.name) === normalizeName(s.name) &&
        rawAffs.has(sp.affiliation) &&
        (!filterAffYear || sp.year === filterAffYear));
      extraCell = `<td class="small dim">${matching.map(t => `<div style="margin-bottom:4px"><span class="pill clickable" onclick="drillYear(${t.year})" title="See ${t.year} program">${t.year}</span> ${t.topic}</div>`).join("")}</td>`;
    }
    const yearPills = s.years.map(y=>`<span class="${pillClass(y)} clickable" onclick="drillYear(${y})" title="See ${y} program">${y}</span>`).join("");
    const affHtml = s.affiliations.map(a => {
      const norm = normalizeAff(a);
      return `<span class="aff-link" onclick="drillAff('${esc(norm)}')" title="See all from ${norm}">${a}</span>`;
    }).join(" → ");
    return `<tr>
      <td><span class="badge ${badgeClass(s.appearances)} badge-link" onclick="drillSpeaker('${esc(s.name)}')" title="See full history">${s.appearances}</span></td>
      <td class="bold name-link" onclick="drillSpeaker('${esc(s.name)}')" title="See full history">${s.name}</td>
      <td class="dim small">${affHtml}</td>
      <td class="dim"><span class="pill clickable" onclick="drillYear(${s.firstYear})" title="See ${s.firstYear} program">${s.firstYear}</span></td>
      <td><span class="pill clickable ${s.lastYear>=2022?'recent':''}" onclick="drillYear(${s.lastYear})" title="See ${s.lastYear} program" ${s.lastYear>=2022?'style="color:var(--accent3)"':''}>${s.lastYear}</span></td>
      <td>${yearPills}</td>
      ${extraCell}
    </tr>`;
  }).join("");
  return `<table>
    <thead><tr>
      <th style="width:60" onclick="doSort('appearances')"># ${arrow('appearances')}</th>
      <th onclick="doSort('name')">Speaker ${arrow('name')}</th>
      <th>Affiliation(s)</th>
      <th style="width:60" onclick="doSort('firstYear')">First ${arrow('firstYear')}</th>
      <th style="width:60" onclick="doSort('lastYear')">Last ${arrow('lastYear')}</th>
      <th>Years</th>
      ${extraHeader}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="footer">${list.length} speaker${list.length!==1?'s':''} shown</div>`;
}

function render() {
  renderTabs();
  const ctrl = document.getElementById("controls");
  const cont = document.getElementById("content");

  const hasFilter = filterAff || filterCat || filterSpeaker;
  let bannerHtml = '';
  if (currentTab === 0 && hasFilter) {
    let label = '';
    if (filterSpeaker) label = `Speaker: <span class="value">${filterSpeaker}</span> — full conference history`;
    else if (filterAff) label = `Institution: <span class="value">${filterAff}</span>${filterAffYear ? ` <span class="pill recent">${filterAffYear}</span>` : ' (all years)'}`;
    else if (filterCat) label = `Topic: <span class="value">${filterCat}</span>${filterCatYear ? ` <span class="pill recent">${filterCatYear}</span>` : ' (all years)'}`;
    bannerHtml = `<div class="filter-banner">
      <span class="label">Filtered by</span> ${label}
      <button class="clear-btn" onclick="clearFilter()">✕ Clear Filter</button>
    </div>`;
  }

  if (currentTab === 0) {
    ctrl.innerHTML = `<div class="controls">
      <input class="search-input" id="searchBox" value="${search}" oninput="setSearch(this.value)"
        placeholder="Search speaker, affiliation, or topic...">
    </div>`;
  } else if (currentTab === 1) {
    ctrl.innerHTML = `<div class="tabs">${allYears.map(y =>
      `<button class="tab-btn ${selectedYear===y?'active':''}" onclick="setSelYear(${y})" style="font-size:12px;padding:6px 12px">${y}</button>`
    ).join("")}</div>`;
  } else { ctrl.innerHTML = ""; }

  if (currentTab === 0) {
    const list = getFiltered();
    const showTopicCol = !!filterCat;
    const showAllTopics = !!filterSpeaker;
    const showAffTopics = !!filterAff;
    cont.innerHTML = `${bannerHtml}<div class="section">${renderSpeakerTable(list, showTopicCol, showAllTopics, showAffTopics)}</div>`;

  } else if (currentTab === 1) {
    const ys = speakers.filter(s => s.year === selectedYear);
    cont.innerHTML = `<div class="section">
      <div class="dim small" style="margin-bottom:12px">${ys.length} presentations in ${selectedYear}</div>
      <table><thead><tr>
        <th style="width:30">#</th><th>Speaker</th><th>Affiliation</th><th>Topic</th><th style="width:70">APO Total</th>
      </tr></thead><tbody>${ys.map((s,i) => {
        const st = stats.find(x => normalizeName(x.name)===normalizeName(s.name));
        const n = st ? st.appearances : 1;
        const clickable = n > 1;
        const normA = normalizeAff(s.affiliation);
        return `<tr>
          <td class="dim">${i+1}</td>
          <td class="bold name-link" onclick="drillSpeaker('${esc(s.name)}')" title="See full APO history">${s.name}</td>
          <td class="dim small aff-link" onclick="drillAff('${esc(normA)}')" title="See all from ${normA}">${s.affiliation}</td>
          <td class="small">${s.topic}</td>
          <td class="center">
            <span class="badge ${n>=3?'mid':n>=2?'low':'none'} ${clickable?'badge-link':''}"
              ${clickable?`onclick="drillSpeaker('${esc(s.name)}')" title="Click to see all ${n} APO appearances"`:''}
              style="font-size:12px; ${clickable?'cursor:pointer':''}">
              ${n}
            </span>
          </td>
        </tr>`;
      }).join("")}</tbody></table></div>`;

  } else if (currentTab === 2) {
    const aMap = new Map();
    speakers.forEach(s => {
      const a = normalizeAff(s.affiliation);
      if (!aMap.has(a)) aMap.set(a, {name:a, years:new Set(), spk:new Set(), count:0});
      const e = aMap.get(a); e.years.add(s.year); e.spk.add(s.name); e.count++;
    });
    const aList = [...aMap.values()].sort((a,b)=>b.count-a.count).filter(a=>a.count>=2);
    const maxC = aList[0]?.count||1;
    cont.innerHTML = `<div class="section"><table><thead><tr>
      <th>Organization</th><th style="width:80">Talks</th><th style="width:80">Speakers</th><th>Active Years</th>
    </tr></thead><tbody>${aList.map(a => `<tr>
      <td class="bold small"><span class="link" onclick="drillAff('${esc(a.name)}')">${a.name}</span></td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="bar" style="width:${Math.max(4,a.count/maxC*120)}px"></div>
        <span class="small">${a.count}</span></div></td>
      <td class="dim">${a.spk.size}</td>
      <td>${[...a.years].sort().map(y=>`<span class="${pillClass(y)} clickable" onclick="drillAff('${esc(a.name)}',${y})" title="See ${a.name} speakers from ${y}">${y}</span>`).join("")}</td>
    </tr>`).join("")}</tbody></table></div>`;

  } else if (currentTab === 3) {
    const byYear = {};
    allYears.forEach(y => { byYear[y] = {}; Object.keys(topicCats).forEach(c => byYear[y][c]=0); });
    speakers.forEach(s => categorizeTopic(s.topic).forEach(c => { if (byYear[s.year]?.[c]!==undefined) byYear[s.year][c]++; }));
    cont.innerHTML = `<div class="section">
      <div class="dim small" style="margin-bottom:16px">Talks per thematic category. Click a category name to see all its speakers, or click a cell to filter by category + year.</div>
      <div style="overflow-x:auto"><table><thead><tr>
        <th style="min-width:180">Category</th>
        ${allYears.map(y=>`<th class="center" style="font-size:10px;padding:6px 4px">'${String(y).slice(2)}</th>`).join("")}
        <th class="center">Total</th>
      </tr></thead><tbody>
      ${Object.keys(topicCats).map(cat => {
        const total = allYears.reduce((s,y)=>s+(byYear[y][cat]||0),0);
        const mx = Math.max(...allYears.map(y=>byYear[y][cat]||0),1);
        const col = catColors[cat]||"#888";
        return `<tr>
          <td class="bold small cat-link" style="white-space:nowrap" onclick="drillCat('${esc(cat)}')">
            <span class="dot" style="background:${col}"></span>${cat}
          </td>
          ${allYears.map(y => {
            const v = byYear[y][cat]||0;
            const op = v ? 0.2+0.8*(v/mx) : 0;
            return `<td class="center" style="padding:4px 2px">${v>0?
              `<span class="trend-cell clickable" onclick="drillCat('${esc(cat)}',${y})" title="Click to see ${v} talks"
                style="background:rgba(108,99,255,${op});color:${op>0.5?'white':'var(--text-dim)'}">${v}</span>`:''}</td>`;
          }).join("")}
          <td class="center bold" style="color:${col}">
            <span class="link" onclick="drillCat('${esc(cat)}')">${total}</span>
          </td>
        </tr>`;
      }).join("")}
      </tbody></table></div>
      <div class="trend-note">
        <div class="trend-note-title">Key trend for 2027 planning:</div>
        <div class="trend-note-body">
          Sustainability & recycling talks went from near-zero before 2019 to dominating 2022 and 2024 programs.
          Catalysis remains the backbone of the conference. Characterization and structure-property topics appear consistently.
          Consider ensuring 2027 balances the sustainability momentum with continued catalyst innovation and emerging areas like AI/ML in polymer design.
        </div>
      </div>
    </div>`;
  }
}

render();
</script>
</body>
</html>
